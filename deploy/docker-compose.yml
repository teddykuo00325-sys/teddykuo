# 凌策公司 — Docker 部署配置
# 在線系統全容器化部署

version: '3.8'

services:
  # ── 後端 API 伺服器 ──
  api:
    build:
      context: ../src/backend
      dockerfile: ../../deploy/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: always
    networks:
      - lingce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── RAG 向量資料庫 ──
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always
    networks:
      - lingce-network

  # ── LiteLLM API 閘道 ──
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml"]
    restart: always
    networks:
      - lingce-network

  # ── 系統監控 ──
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: always
    networks:
      - lingce-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=lingce2026
    volumes:
      - grafana_data:/var/lib/grafana
    restart: always
    networks:
      - lingce-network

volumes:
  qdrant_data:
  grafana_data:

networks:
  lingce-network:
    driver: bridge
